active_mode: nvmetcp_tls
global:
  artifacts_dir: artifacts
  workers: 1
  shard_count: 1
  shard_index: 0
artifact_policy:
  max_total_gb: 200
  stop_when_free_space_below_gb: 20
  compression:
    enabled: true
    format: gzip
  pass:
    keep_full: false
    keep_stdout_tail_kb: 16
    keep_stderr_tail_kb: 16
    keep_trace: true
    keep_payload: false
    keep_pcap: false
  fail:
    keep_full: true
    keep_first_n_per_bucket: 5
    keep_every_n_after: 100
    keep_pcap: on_new_bucket
    max_pcap_mb: 64
    keep_payload: true
  buckets:
    key_fields: [mode, verdict, reason, operation_or_protocol_or_pdu, field, strategy]
  pruning:
    enabled: true
    prune_pass_first: true
    preserve_core: true
modes:
  nvmetcp_tls:
    catalog: field_catalog.yaml
    target_traddr: 192.0.2.10
    target_trsvcid: 4420
    subsysnqn: nqn.2026-06.example:nvmetcp-tls-fuzz
    device: /dev/nvme1n1
    engine: fio
    runtime_s: 5
    timeout_s: 120
    allow_write: false
    tool_paths:
      nvme: nvme
      fio: fio
      vdbench: vdbench
    # none: 只跑现有 device 上的 workload
    # per-case: 每个 case 执行 nvme connect -> fio/vdbench -> nvme disconnect
    connection_lifecycle: none
    transport: tcp
    connect_extra_args: []
    disconnect_extra_args: []
    discover_before_connect: false
    disconnect_after_case: true
    tls_keyring: .nvme
    tls_key_identity: NVMeTLSkey-1:replace-me
  nvme_kv:
    catalog: kv_field_catalog.yaml
    device_path: /dev/nvme1n1
    nsid: 1
    target_nqn: nqn.2026-06.example:kv
    allowed_model_or_serial: [TEST_ARRAY_MODEL_OR_SERIAL]
    key_prefix: kvfuzz-test-
    max_qps: 10
    timeout_ms: 1000
    allow_live_target: false
  net_protocol:
    catalog: net_field_catalog.yaml
    iface: eth-test
    target_mac: 02:00:00:00:00:02
    target_ipv4: 192.0.2.10
    target_ipv6: 2001:db8::10
    tcp_ports: [4420]
    udp_ports: [4420]
    packet_engine: stdlib
    tool_paths:
      tcpdump: tcpdump
      tcpreplay: tcpreplay
    pcap_only: true
    max_pps: 100
    max_duration_s: 30
    iface_allowlist: [eth-test]
    forbid_default_route_iface: true
    allow_disruptive: false
    allow_broadcast: false
    allow_multicast: false
